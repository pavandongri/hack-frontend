<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="StreetPulse">
  <defs>
    <linearGradient id="sp-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1976d2" />
      <stop offset="1" stop-color="#0d47a1" />
    </linearGradient>
    <linearGradient id="sp-shine" x1="12" y1="8" x2="36" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#sp-bg)" />
  <path d="M12 10c8 0 16 0 24 2v4c-8-1.5-16-2-24-2V10z" fill="url(#sp-shine)" />
  <!-- Road perspective -->
  <path
    d="M24 12 L31 38 H17 L24 12Z"
    fill="#ffffff"
    fill-opacity="0.18"
  />
  <path
    d="M24 16 L28 34 H20 L24 16Z"
    fill="#ffffff"
  />
  <!-- Center lane markers -->
  <rect x="23" y="20" width="2" height="3" rx="0.5" fill="#1976d2" fill-opacity="0.9" />
  <rect x="23" y="26" width="2" height="2.5" rx="0.5" fill="#1976d2" fill-opacity="0.85" />
  <!-- Pulse ring (signal) -->
  <circle cx="36" cy="14" r="5" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.5" fill="none" />
  <circle cx="36" cy="14" r="2.25" fill="#ffffff" />
</svg>
